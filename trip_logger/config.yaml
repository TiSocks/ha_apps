name: "Hyndai/Kia/Genesis Data Logger"
version: "1.1.5"
slug: "data_logger"
description: "Automatically pulls daily trip logs and energy stats from Kia Connect and saves them to a PostgreSQL database."
arch:
  - aarch64
  - amd64
init: false
hassio_api: true
options:
  username: "your_email@example.com"
  password: "your_password"
  region: "AUSTRALIA"
  brand: "KIA"
  db_host: "192.168.1.xxx"
  db_name: "homeassistant"
  db_user: "postgres"
  db_password: ""
  db_port: 5432
schema:
  username: str
  password: password
  region: "list(EUROPE|CANADA|USA|CHINA|AUSTRALIA|INDIA|NZ|BRAZIL)"
  brand: "list(KIA|HYUNDAI|GENESIS)"
  db_host: "str"
  db_name: "str"
  db_user: "str"
  db_password: "password"
  db_port: "int(1,65535)"

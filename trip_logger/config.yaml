name: "Hyndai/Kia/Genesis Trip Logger"
version: "1.0.25"
slug: "trip_logger"
description: "Automatically pulls daily trip logs from Kia Connect and saves them to a CSV."
arch:
  - aarch64
  - amd64
init: false
hassio_api: true
map:
  - share:rw
options:
  username: "your_email@example.com"
  password: "your_password"
  folder: "/share/"
  region: "AUSTRALIA"
  brand: "KIA"
  db_host: "192.168.1.xxx"
  db_name: "homeassistant"
  db_user: "postgres"
  db_password: ""
  db_port: 5432
schema:
  username: str
  password: password
  folder: str
  region: "list(EUROPE|CANADA|USA|CHINA|AUSTRALIA|INDIA|NZ|BRAZIL)"
  brand: "list(KIA|HYUNDAI|GENESIS)"
  db_host: "str"
  db_name: "str"
  db_user: "str"
  db_password: "password"
  db_port: "int(1,65535)"
